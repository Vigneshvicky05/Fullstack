<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Table</title>
  <style>
    table {
      width: 60%;
      border-collapse: collapse;
      margin: 30px auto;
    }
    th, td {
      border: 1px solid #333;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    caption {
      margin-bottom: 10px;
      font-weight: bold;
      font-size: 1.2em;
    }
  </style>
</head>
<body>

  <table>
    <caption>Employee Information</caption>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>101</td>
        <td>Alice</td>
        <td>Marketing</td>
      </tr>
      <tr>
        <td>102</td>
        <td>Bob</td>
        <td>Engineering</td>
      </tr>
      <tr>
        <td>103</td>
        <td>Charlie</td>
        <td>HR</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
